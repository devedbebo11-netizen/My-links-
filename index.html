<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Date & Code - Premium Slot Portfolio</title>
    <style>
        :root {
            --primary: #ff2a5f;
            --primary-glow: rgba(255, 42, 95, 0.4);
            --gold: #ffd700;
            --gold-glow: rgba(255, 215, 0, 0.3);
            --bg: #09090b;
            --card-bg: rgba(22, 22, 27, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        /* 🖤 شاشة إنترو فاخرة وهادية جداً (Luxury Minimalist) */
        .sphere-intro-overlay {
            position: fixed; 
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg);
            z-index: 1000; 
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* حاوية الدائرة الـ 3D المحمية داخل الكادر */
        .sphere-container {
            width: 160px; 
            height: 160px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: orbEntrance 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* مجسم معتم فاخر بلمعة ذهبية هادية غير مبتذلة */
        .sphere-3d {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #24242e 0%, #0f0f14 100%);
            border: 1px solid rgba(255, 215, 0, 0.3);
            position: absolute;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 25px var(--gold-glow);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* تأثير لمعة ناعمة تمر فوق الكرة */
        .sphere-3d::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 45%, rgba(255,215,0,0.1) 50%, transparent 55%);
            animation: shine Sweep 2.5s infinite linear;
        }

        /* اللوجو بيظهر بوضوح وبدون دوران كرينج */
        .sphere-3d img {
            width: 75%;
            height: 75%;
            object-fit: contain; 
            max-width: 100%;
            max-height: 100%;
            display: block;
            opacity: 0;
            transform: scale(0.9);
            animation: logoFadeIn 1s cubic-bezier(0.25, 1, 0.5, 1) 0.5s forwards;
        }

        /* أنيميشن دخول المجسم بسلاسة */
        @keyframes orbEntrance {
            0% { transform: scale(0.8) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        @keyframes logoFadeIn {
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes shineSweep {
            0% { transform: translate(-30%, -30%); }
            100% { transform: translate(30%, 30%); }
        }

        /* التلاشي الراقي للخروج */
        .sphere-intro-overlay.fade-out {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }

        /* 📱 محاكي الآيفون الرئيسي */
        .iphone-container {
            width: 100%;
            max-width: 412px;
            height: 100vh;
            max-height: 892px;
            background: radial-gradient(circle at top, #13131a 0%, var(--bg) 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .iphone-container.visible {
            opacity: 1;
        }

        /* شاشة العنوان النيون الراقي */
        .header-panel {
            text-align: center;
            width: 100%;
            background: #111115;
            border: 1px solid rgba(255, 42, 95, 0.3);
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .header-panel h1 {
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 0 0 6px var(--primary-glow);
            letter-spacing: 1px;
            font-weight: 800;
        }

        .header-panel p {
            font-size: 0.75rem;
            color: var(--gold);
            text-shadow: 0 0 4px var(--gold-glow);
            margin-top: 3px;
        }

        /* منطقة الأركيد الميكانيكية */
        .slot-machine-wrapper {
            position: relative;
            width: 100%;
            height: 420px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .machine-housing {
            width: 85%;
            height: 100%;
            background: linear-gradient(135deg, #181822 0%, #0d0d11 100%);
            border: 2px solid #2d2d3a;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .view-window {
            width: 90%;
            height: 80%;
            background: #050507;
            border-radius: 12px;
            border: 2px solid #1c1c24;
            position: relative;
            overflow: hidden;
            perspective: 1000px;
        }

        .window-shadow-top, .window-shadow-bottom {
            position: absolute;
            left: 0; right: 0; height: 35%;
            z-index: 4;
            pointer-events: none;
        }
        .window-shadow-top { top: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); }
        .window-shadow-bottom { bottom: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); }

        .cylinder-3d {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: transform;
        }

        .slot-card {
            position: absolute;
            width: 85%;
            height: 110px;
            background: linear-gradient(145deg, #1e1e26 0%, #111116 100%);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backface-visibility: hidden;
            user-select: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .slot-card.active-focus {
            border-color: var(--gold);
            box-shadow: 0 0 12px var(--gold-glow);
        }

        .slot-card h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 2px; }
        .slot-card p { font-size: 0.65rem; color: #71717a; }
        .slot-card .card-icon { font-size: 1.3rem; margin-bottom: 4px; }

        /* 🕹️ ذراع ميكانيكي متناسق وراقي */
        .handle-container {
            position: absolute;
            right: -10px;
            top: 25%;
            width: 40px;
            height: 200px;
            cursor: pointer;
        }

        .handle-base {
            width: 20px;
            height: 36px;
            background: linear-gradient(135deg, #444 0%, #1c1c24 100%);
            border: 1px solid #555;
            border-radius: 0 6px 6px 0;
            position: absolute;
            left: 0; top: 70px;
        }

        .handle-rod {
            width: 6px;
            height: 100px;
            background: linear-gradient(to right, #666, #ddd, #333);
            position: absolute;
            left: 7px; bottom: 90px;
            transform-origin: bottom center;
            transition: transform 0.15s ease-out;
            border-radius: 3px;
        }

        .handle-ball {
            width: 24px;
            height: 24px;
            background: radial-gradient(circle at 35% 35%, #ff4b72 0%, #990020 100%);
            border-radius: 50%;
            position: absolute;
            top: -20px; left: -9px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5), 0 0 8px var(--primary-glow);
        }

        .handle-container.pulling .handle-rod { transform: rotateX(60deg) scaleY(0.7); }

        /* Pop-up النتيجة */
        .popup-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 5, 7, 0.8);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .popup-overlay.show { opacity: 1; pointer-events: auto; }

        .result-popup {
            width: 85%;
            background: #111115;
            border: 1px solid var(--gold);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
            transform: scale(0.85);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .popup-overlay.show .result-popup { transform: scale(1); }

        .popup-badge {
            background: rgba(255, 215, 0, 0.08);
            color: var(--gold);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 215, 0, 0.15);
        }

        .result-popup h2 { font-size: 1.25rem; margin-bottom: 6px; }
        .result-popup p { font-size: 0.8rem; color: #a1a1aa; margin-bottom: 16px; }

        .action-btn {
            display: block;
            width: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, #e60039 100%);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.95rem;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .close-btn { background: transparent; border: none; color: #52525b; font-size: 0.8rem; margin-top: 10px; cursor: pointer; }

        .control-panel { width: 100%; z-index: 10; }
        .spin-trigger-btn {
            width: 100%;
            background: #111115;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 14px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>

    <div class="sphere-intro-overlay" id="introOverlay">
        <div class="sphere-container">
            <div class="sphere-3d">
                <img src="https://i.ibb.co/kg5M8XSY/79-C702-C8-3-D72-41-D1-851-C-FDD3-DC6-FE36-D.png" alt="Date & Code Premium Logo">
            </div>
        </div>
    </div>

    <div class="iphone-container" id="mainContainer">
        <div class="header-panel">
            <h1>Date & Code</h1>
            <p>SPIN THE ARCADE TO UNLOCK MY WORK</p>
        </div>

        <div class="slot-machine-wrapper">
            <div class="machine-housing">
                <div class="view-window">
                    <div class="window-shadow-top"></div>
                    <div class="window-shadow-bottom"></div>
                    <div class="cylinder-3d" id="cylinder"></div>
                </div>
            </div>
            <div class="handle-container" id="handleContainer">
                <div class="handle-base"></div>
                <div class="handle-rod" id="handleRod"><div class="handle-ball"></div></div>
            </div>
        </div>

        <div class="control-panel">
            <button class="spin-trigger-btn" id="spinBtn"><span>🎰</span> JACKPOT SPIN</button>
        </div>

        <div class="popup-overlay" id="popupOverlay">
            <div class="result-popup">
                <span class="popup-badge">MATCH FOUND!</span>
                <h2 id="projectTitle">Project Name</h2>
                <p id="projectDesc">Premium interactive experience.</p>
                <a href="#" target="_blank" class="action-btn" id="projectLink">VISIT PROJECT</a>
                <button class="close-btn" id="closePopup">Spin Again</button>
            </div>
        </div>
    </div>

    <script>
        const projects = [
            { title: "Sophia Luxury Showcase", desc: "Premium interactive experience tailored for international elite audiences.", url: "https://alexander-sophia.vercel.app", icon: "✨" },
            { title: "3D Floral Experience", desc: "Immersive high-end 3D graphics and smooth motion design.", url: "https://flowers-weld-three.vercel.app", icon: "🌸" },
            { title: "Creative Concept V1", desc: "Cutting-edge interface focusing on responsive micro-interactions.", url: "https://new-one-8xh6.vercel.app", icon: "🚀" },
            { title: "Premium Brand Platform", desc: "Ultra-fast deployment featuring high converting minimalist design.", url: "https://manu-had.vercel.app", icon: "💼" },
            { title: "Luxury Digital Invitation", desc: "Gamified custom 3D wedding experience with interactive storytelling.", url: "https://wedding-tawny-ten-89.vercel.app", icon: "💍" },
            { title: "David Creative Portfolio", desc: "Advanced web structure emphasizing premium typography and layout.", url: "https://david-web-cas.vercel.app", icon: "🎨" },
            { title: "Interactive Concept V2", desc: "Sophisticated front-end architectures optimized for mobile viewports.", url: "https://david-and-his-project.vercel.app", icon: "⚡" },
            { title: "Connect On Instagram", desc: "Let's build your next premium 3D project. Drop a message directly on Instagram DM.", url: "https://instagram.com/Loveframe_eg", icon: "📸" }
        ];

        const cylinder = document.getElementById('cylinder');
        const handleContainer = document.getElementById('handleContainer');
        const spinBtn = document.getElementById('spinBtn');
        const popupOverlay = document.getElementById('popupOverlay');
        const closePopup = document.getElementById('closePopup');
        const introOverlay = document.getElementById('introOverlay');
        const mainContainer = document.getElementById('mainContainer');

        const totalCards = projects.length;
        const radius = 160; 
        let currentRotation = 0; 
        let isSpinning = false;
        let velocity = 0;

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                introOverlay.classList.add('fade-out');
                mainContainer.classList.add('visible');
            }, 2200); 
        });

        function initCylinder() {
            projects.forEach((proj, idx) => {
                const card = document.createElement('div');
                card.className = 'slot-card';
                const angle = (idx * 360) / totalCards;
                card.style.transform = `rotateX(${angle}deg) translateZ(${radius}px)`;
                card.innerHTML = `<div class="card-icon">${proj.icon}</div><h3>${proj.title}</h3><p>Interactive Demo</p>`;
                cylinder.appendChild(card);
            });
            updateFocusCard();
        }

        function updateFocusCard() {
            const cards = document.querySelectorAll('.slot-card');
            const normalizedRotation = ((currentRotation % 360) + 360) % 360;
            const activeIndex = Math.round((360 - normalizedRotation) / (360 / totalCards)) % totalCards;
            cards.forEach((card, idx) => {
                if (idx === activeIndex) card.classList.add('active-focus');
                else card.classList.remove('active-focus');
            });
            return activeIndex;
        }

        function spinMachine() {
            if (isSpinning) return;
            isSpinning = true;
            handleContainer.classList.add('pulling');
            setTimeout(() => handleContainer.classList.remove('pulling'), 200);
            velocity = 28 + Math.random() * 8;
            
            function update() {
                currentRotation += velocity;
                cylinder.style.transform = `rotateX(${currentRotation}deg)`;
                updateFocusCard();
                if (velocity > 0.4) {
                    velocity *= 0.97;
                    requestAnimationFrame(update);
                } else {
                    const anglePerCard = 360 / totalCards;
                    currentRotation = Math.round(currentRotation / anglePerCard) * anglePerCard;
                    cylinder.style.transform = `rotateX(${currentRotation}deg)`;
                    isSpinning = false;
                    setTimeout(() => showResult(updateFocusCard()), 300);
                }
            }
            requestAnimationFrame(update);
        }

        function showResult(index) {
            const project = projects[index];
            document.getElementById('projectTitle').innerText = project.title;
            document.getElementById('projectDesc').innerText = project.desc;
            document.getElementById('projectLink').href = project.url;
            popupOverlay.classList.add('show');
        }

        spinBtn.addEventListener('click', spinMachine);
        handleContainer.addEventListener('click', spinMachine);
        closePopup.addEventListener('click', () => popupOverlay.classList.remove('show'));
        initCylinder();
    </script>
</body>
</html>
